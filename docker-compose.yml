# Nexus Care AI — local-dev stack.
#
# Two profiles:
#   (default)  — only Postgres. Use this when running api/platform/web from
#                your shell during active development. Quick iteration, hot
#                reload.
#                  docker compose up -d
#
#   full       — full stack in containers (Postgres + clinical API + platform
#                API + frontend), built from the Dockerfiles in infra/docker/.
#                Use this for "show this to someone" demos or to verify the
#                images build correctly.
#                  docker compose --profile full up --build
#
# Inside containers, services reach each other by service name (not localhost).
#   api:8000             ← clinical API
#   platform:8000        ← platform API
#   db:5432              ← postgres

services:
  db:
    image: postgres:18.3-bookworm
    container_name: nexus_care_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_care
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - nexus_care_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_care"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----- profile: full -----
  migrate:
    profiles: ["full"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: nexus_care_migrate
    environment:
      SERVICE: migrate
      DATABASE_URL: postgresql+psycopg://nexus:nexus@db:5432/nexus_care
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: nexus_care_api
    environment:
      SERVICE: api
      SERVICE_HEALTH_PATH: health
      PORT: "8000"
      WORKERS: "2"
      NEXUS_API_DATABASE_URL: postgresql+psycopg://nexus:nexus@db:5432/nexus_care
      NEXUS_API_ENVIRONMENT: development
      NEXUS_API_FRONTEND_ORIGIN: http://localhost:3001
    ports:
      - "18001:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  platform:
    profiles: ["full"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: nexus_care_platform
    environment:
      SERVICE: platform
      SERVICE_HEALTH_PATH: platform/health
      PORT: "8000"
      WORKERS: "2"
      NEXUS_PLATFORM_DATABASE_URL: postgresql+psycopg://nexus:nexus@db:5432/nexus_care
      NEXUS_PLATFORM_ENVIRONMENT: development
      NEXUS_PLATFORM_ADMIN_UI_ORIGIN: http://localhost:3001
    ports:
      - "18002:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:8000
    container_name: nexus_care_web
    environment:
      # Inside the docker network, the api service is reachable at api:8000.
      # The browser still sees the rewritten /api/* path on http://localhost:3001.
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      PORT: "3000"
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  nexus_care_pgdata:
    name: nexus_care_pgdata
