# Alembic config for Nexus Care AI.
#
# Run from repo root:
#     uv run alembic upgrade head           # apply pending migrations
#     uv run alembic revision --autogenerate -m "..."  # create a new migration
#     uv run alembic downgrade -1           # roll back one
#
# The actual database URL comes from the DATABASE_URL environment variable
# (read inside db/alembic/env.py). Never hardcode a URL here.

[alembic]
script_location = db/alembic
prepend_sys_path = .
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
version_path_separator = os

# sqlalchemy.url comes from env.py — leave blank here.
sqlalchemy.url =

[post_write_hooks]
# Run ruff on generated migration files so they match repo style.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
