[project]
name = "nexus-care-tenancy"
version = "0.1.0"
description = "Tenant scoping primitives — context var, helpers, state guards."
requires-python = ">=3.13,<3.14"
dependencies = [
    "sqlalchemy>=2.0.36",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_care_tenancy"]
